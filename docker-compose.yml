services:
  document-db:
    image: postgres:18-alpine
    container_name: document-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-admin}
      POSTGRES_DB: ${DB_NAME:-doc}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_data_document:/var/lib/postgresql

  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    container_name: document_app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=saga-db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./document-service/.env
    ports:
      - "8000:8000"

volumes:
  postgres_data_document:
